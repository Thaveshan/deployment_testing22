# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Angular frontend to Azure Web App - ProfileAppFrontend888

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Angular frontend
        working-directory: ./frontend
        run: npm run build

      - name: Prepare frontend deployment package
        run: |
          mkdir frontend-package
          cp frontend/server.js frontend-package/
          cp frontend/package.json frontend-package/
          if [ -f frontend/package-lock.json ]; then cp frontend/package-lock.json frontend-package/; fi
          cp -r frontend/dist frontend-package/
          cd frontend-package
          npm install --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: frontend-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E9AE2A8978244CD198F2B921A5329F65 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0C7836B8F9C34D2581DAFB1F57812A53 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DF2BE155A95842F285B8EE3C83D25515 }}

      - name: Deploy frontend to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ProfileAppFrontend888'
          slot-name: 'Production'
          package: .
